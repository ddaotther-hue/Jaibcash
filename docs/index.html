<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Jaib Cash</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      background: #0A1122;
      color: #F3E9D2;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 30px 16px 50px;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
      position: relative;
    }

    .particle {
      position: fixed;
      width: 4px;
      height: 4px;
      background: #F2CD6B;
      border-radius: 50%;
      opacity: 0.4;
      pointer-events: none;
      animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      0% { transform: translateY(0) translateX(0); opacity: 0; }
      10% { opacity: 0.5; }
      90% { opacity: 0.3; }
      100% { transform: translateY(-100vh) translateX(20px); opacity: 0; }
    }

    h1 { color: #F2CD6B; font-size: 26px; margin: 0; position: relative; z-index: 1; }
    h1 span { color: #FCE8AE; }
    .sub { color: rgba(243,233,210,0.6); font-size: 13px; margin: 4px 0 20px; position: relative; z-index: 1; }

    .mascot-stage {
      position: relative;
      width: 260px;
      height: 260px;
      margin: 0 auto 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .level-ring-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: rotate(-90deg); }
    .level-ring-bg { fill: none; stroke: rgba(242,205,107,0.12); stroke-width: 6; }
    .level-ring-fg {
      fill: none;
      stroke: url(#ringGradient);
      stroke-width: 6;
      stroke-linecap: round;
      transition: stroke-dashoffset 1.2s cubic-bezier(.34,1.56,.64,1);
    }
    .mascot-glow {
      position: absolute;
      top: 50%; left: 50%;
      width: 190px; height: 190px;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(242,205,107,0.25) 0%, rgba(242,205,107,0) 70%);
      border-radius: 50%;
      animation: glowPulse 3s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes glowPulse {
      0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 0.9; transform: translate(-50%, -50%) scale(1.08); }
    }

    .mascot-img {
      position: relative;
      width: 150px;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      animation: idleFloat 3.2s ease-in-out infinite;
      transform-origin: bottom center;
    }
    @keyframes idleFloat {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-10px) rotate(1deg); }
    }
    .mascot-img.bounce { animation: bounce 0.7s ease; }
    @keyframes bounce {
      0% { transform: scale(1) translateY(0); }
      30% { transform: scale(1.18) translateY(-25px) rotate(-6deg); }
      55% { transform: scale(1.05) translateY(-5px) rotate(4deg); }
      75% { transform: scale(1.1) translateY(-12px) rotate(-2deg); }
      100% { transform: scale(1) translateY(0) rotate(0deg); }
    }
    .mascot-img.celebrate { animation: celebrate 1s ease; }
    @keyframes celebrate {
      0% { transform: scale(1) rotate(0deg); }
      20% { transform: scale(1.15) rotate(-8deg) translateY(-15px); }
      40% { transform: scale(1.2) rotate(8deg) translateY(-20px); }
      60% { transform: scale(1.12) rotate(-5deg) translateY(-10px); }
      80% { transform: scale(1.08) rotate(3deg) translateY(-4px); }
      100% { transform: scale(1) rotate(0deg) translateY(0); }
    }
    .mascot-img.sleeping { animation: none; filter: brightness(0.6); }

    .sleep-zzz {
      position: absolute; top: 10px; right: 30px;
      font-size: 20px; color: #F2CD6B; opacity: 0; pointer-events: none;
    }
    .sleep-zzz.show { animation: zzzFloat 2s ease-in-out infinite; }
    @keyframes zzzFloat {
      0% { opacity: 0; transform: translateY(0) scale(0.8); }
      30% { opacity: 1; }
      100% { opacity: 0; transform: translateY(-40px) scale(1.3); }
    }

    .sparkle { position: absolute; font-size: 18px; opacity: 0; pointer-events: none; }
    .sparkle.pop { animation: sparklePop 0.9s ease-out forwards; }
    @keyframes sparklePop {
      0% { opacity: 0; transform: scale(0) translate(0,0); }
      30% { opacity: 1; }
      100% { opacity: 0; transform: scale(1.4) translate(var(--sx), var(--sy)); }
    }

    .level-label { margin-top: -6px; position: relative; z-index: 1; }
    .level-name { font-size: 15px; font-weight: bold; color: #FCE8AE; letter-spacing: 1px; }
    .level-pct { font-size: 12px; color: rgba(243,233,210,0.55); margin-top: 2px; }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      width: 100%;
      max-width: 420px;
      margin: 18px 0;
      position: relative; z-index: 1;
    }
    .stat-card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(242,205,107,0.15);
      border-radius: 18px;
      padding: 14px 10px;
    }
    .stat-icon { font-size: 20px; margin-bottom: 4px; }
    .stat-label { font-size: 11px; color: rgba(243,233,210,0.6); margin-bottom: 4px; }
    .stat-value { font-size: 18px; font-weight: bold; color: #FCE8AE; }
    .stat-value.small-unit { font-size: 17px; }

    .withdraw-panel {
      background: rgba(19,31,61,0.8);
      border-radius: 16px;
      padding: 18px 20px;
      margin: 6px 0 15px;
      width: 100%;
      max-width: 420px;
      border: 1px solid rgba(242,205,107,0.1);
      position: relative; z-index: 1;
    }
    .withdraw-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .withdraw-title { font-size: 13px; color: #F2CD6B; font-weight: bold; }
    .withdraw-pct { font-size: 13px; color: #FCE8AE; font-weight: bold; }
    .progress-track { width: 100%; height: 10px; background: rgba(255,255,255,0.08); border-radius: 10px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #C9A03E, #F2CD6B); border-radius: 10px; transition: width 1s ease, background 0.4s ease; }
    .progress-fill.unlocked { background: #6FA287; }
    .withdraw-sub { font-size: 12px; color: rgba(243,233,210,0.6); margin-top: 8px; display: flex; justify-content: space-between; }
    .withdraw-unlocked-msg { display: none; color: #6FA287; font-weight: bold; font-size: 13px; margin-top: 8px; }

    .panel {
      background: rgba(19,31,61,0.8);
      border-radius: 16px;
      padding: 20px;
      margin: 8px 0;
      width: 100%;
      max-width: 420px;
      border: 1px solid rgba(242,205,107,0.1);
      position: relative; z-index: 1;
    }
    .eyebrow { font-size: 12px; color: #F2CD6B; text-transform: uppercase; letter-spacing: 2px; margin: 0 0 10px; }
    .btn {
      background: linear-gradient(135deg, #C9A03E, #F2CD6B);
      color: #0A1122;
      border: none;
      padding: 15px 40px;
      border-radius: 30px;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s;
      touch-action: manipulation;
      width: 100%;
    }
    .btn:active { transform: scale(0.96); }
    .btn.pulse { animation: btnPulse 1.6s ease-in-out infinite; }
    @keyframes btnPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(242,205,107,0.5); }
      50% { box-shadow: 0 0 0 12px rgba(242,205,107,0); }
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; animation: none; }
    .status { margin-top: 12px; font-size: 13px; color: #F2CD6B; }
    .btn-outline { background: transparent; border: 1px solid rgba(242,205,107,0.4); color: #F2CD6B; }

    .achievement {
      position: fixed;
      top: 20px; left: 50%;
      transform: translateX(-50%) translateY(-120px);
      background: linear-gradient(135deg, #1c2b52, #131f3d);
      border: 1px solid rgba(242,205,107,0.5);
      color: #FCE8AE;
      padding: 14px 22px;
      border-radius: 14px;
      font-size: 14px;
      font-weight: bold;
      display: flex; align-items: center; gap: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      z-index: 50;
      transition: transform 0.4s cubic-bezier(.34,1.56,.64,1);
      white-space: nowrap;
    }
    .achievement.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

  <div id="particleField"></div>

  <div class="achievement" id="achievementToast">
    <span>🏆</span>
    <span id="achievementText">First Ad Watched</span>
  </div>

  <h1>Jaib <span>Cash</span></h1>
  <p class="sub">Turn Your Time Into Rewards</p>

  <div class="mascot-stage" id="mascotWrap">
    <svg class="level-ring-svg" viewBox="0 0 260 260">
      <defs>
        <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#C9A03E"/>
          <stop offset="100%" stop-color="#F2CD6B"/>
        </linearGradient>
      </defs>
      <circle class="level-ring-bg" cx="130" cy="130" r="120"></circle>
      <circle class="level-ring-fg" id="levelRingFg" cx="130" cy="130" r="120"
              stroke-dasharray="754" stroke-dashoffset="754"></circle>
    </svg>
    <div class="mascot-glow"></div>
    <span class="sleep-zzz" id="sleepZzz">💤</span>
    <img src="mascot.png?v=5" alt="مساعد Jaib Cash" class="mascot-img" id="mascotImg">
  </div>
  <div class="level-label">
    <div class="level-name" id="levelName">⭕ Silver Level</div>
    <div class="level-pct" id="levelPct">72% إلى Gold</div>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-icon">🪙</div>
      <div class="stat-label">رصيدك</div>
      <div class="stat-value small-unit" id="statBalance">128,500</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">💼</div>
      <div class="stat-label">رصيد المعلن</div>
      <div class="stat-value">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">👥</div>
      <div class="stat-label">الإحالات</div>
      <div class="stat-value">12</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">🏆</div>
      <div class="stat-label">المستوى</div>
      <div class="stat-value" id="statLevel">Silver</div>
    </div>
  </div>

  <div class="withdraw-panel">
    <div class="withdraw-top">
      <span class="withdraw-title">التقدم نحو السحب</span>
      <span class="withdraw-pct" id="withdrawPct">6.5%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="withdrawFill" style="width: 6.5%;"></div>
    </div>
    <div class="withdraw-sub">
      <span>الحد الأدنى: $2</span>
      <span id="withdrawRemaining">متبقٍ 1,871,500 نقطة</span>
    </div>
    <div class="withdraw-unlocked-msg" id="withdrawUnlockedMsg">🎉 تم فتح السحب!</div>
  </div>

  <div class="panel">
    <p class="eyebrow">شاهد إعلان</p>
    <button class="btn pulse" id="watchBtn">🎥 شاهد الآن</button>
    <div class="status" id="statusLine">المكافأة: +1000 نقطة</div>
  </div>

  <div class="panel">
    <p class="eyebrow">الدعم</p>
    <button class="btn btn-outline" id="supportBtn">📞 تواصل مع الدعم</button>
  </div>

  <script>
    const tg = window.Telegram?.WebApp;
    if (tg) { tg.ready(); tg.expand(); }

    const mascot = document.getElementById('mascotImg');
    const mascotWrap = document.getElementById('mascotWrap');
    const sleepZzz = document.getElementById('sleepZzz');
    const statusLine = document.getElementById('statusLine');
    const watchBtn = document.getElementById('watchBtn');
    const achievementToast = document.getElementById('achievementToast');
    const achievementText = document.getElementById('achievementText');
    const particleField = document.getElementById('particleField');
    const statBalance = document.getElementById('statBalance');
    const levelRingFg = document.getElementById('levelRingFg');
    const levelName = document.getElementById('levelName');
    const levelPct = document.getElementById('levelPct');
    const statLevel = document.getElementById('statLevel');
    const withdrawPct = document.getElementById('withdrawPct');
    const withdrawFill = document.getElementById('withdrawFill');
    const withdrawRemaining = document.getElementById('withdrawRemaining');
    const withdrawUnlockedMsg = document.getElementById('withdrawUnlockedMsg');

    let balance = 128500;
    let cooldownActive = false;

    const LEVELS = [
      { name: 'Bronze',    min: 0 },
      { name: 'Silver',    min: 50000 },
      { name: 'Gold',      min: 150000 },
      { name: 'Platinum',  min: 400000 },
      { name: 'Diamond',   min: 800000 },
      { name: 'Master',    min: 1500000 },
      { name: 'Legendary', min: 3000000 }
    ];
    const WITHDRAW_REQUIRED = 2000000;
    const RING_CIRC = 754;

    function updateLevel(bal) {
      let current = LEVELS[0];
      let next = LEVELS[1];
      for (let i = 0; i < LEVELS.length; i++) {
        if (bal >= LEVELS[i].min) {
          current = LEVELS[i];
          next = LEVELS[i + 1] || null;
        }
      }
      let pct = 100;
      if (next) pct = ((bal - current.min) / (next.min - current.min)) * 100;
      pct = Math.max(0, Math.min(100, pct));
      const offset = RING_CIRC - (RING_CIRC * pct / 100);
      levelRingFg.style.strokeDashoffset = offset;
      levelName.textContent = `⭕ ${current.name} Level`;
      levelPct.textContent = next ? `${Math.round(pct)}% إلى ${next.name}` : 'أعلى مستوى!';
      statLevel.textContent = current.name;
    }

    function updateWithdraw(bal) {
      const pct = Math.min(100, (bal / WITHDRAW_REQUIRED) * 100);
      withdrawPct.textContent = pct.toFixed(1) + '%';
      withdrawFill.style.width = pct + '%';
      const remaining = Math.max(0, WITHDRAW_REQUIRED - bal);
      if (remaining <= 0) {
        withdrawFill.classList.add('unlocked');
        withdrawRemaining.style.display = 'none';
        withdrawUnlockedMsg.style.display = 'block';
      } else {
        withdrawFill.classList.remove('unlocked');
        withdrawRemaining.style.display = 'inline';
        withdrawUnlockedMsg.style.display = 'none';
        withdrawRemaining.textContent = `متبقٍ ${remaining.toLocaleString()} نقطة`;
      }
    }

    function spawnParticles(count) {
      for (let i = 0; i < count; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + 'vw';
        p.style.bottom = '-10px';
        p.style.animationDuration = (8 + Math.random() * 10) + 's';
        p.style.animationDelay = (Math.random() * 10) + 's';
        particleField.appendChild(p);
      }
    }
    spawnParticles(18);

    function mascotBounce() {
      mascot.classList.remove('bounce');
      void mascot.offsetWidth;
      mascot.classList.add('bounce');
      setTimeout(() => mascot.classList.remove('bounce'), 700);
    }
    function mascotCelebrate() {
      mascot.classList.remove('celebrate');
      void mascot.offsetWidth;
      mascot.classList.add('celebrate');
      spawnSparkles();
      setTimeout(() => mascot.classList.remove('celebrate'), 1000);
    }
    function spawnSparkles() {
      const symbols = ['✨','⭐','💰'];
      for (let i = 0; i < 8; i++) {
        const s = document.createElement('span');
        s.className = 'sparkle';
        s.textContent = symbols[Math.floor(Math.random() * symbols.length)];
        const angle = (Math.PI * 2 * i) / 8;
        const dist = 90 + Math.random() * 30;
        s.style.setProperty('--sx', Math.cos(angle) * dist + 'px');
        s.style.setProperty('--sy', Math.sin(angle) * dist + 'px');
        s.style.left = '50%';
        s.style.top = '50%';
        mascotWrap.appendChild(s);
        requestAnimationFrame(() => s.classList.add('pop'));
        setTimeout(() => s.remove(), 950);
      }
    }
    function enterSleep() { mascot.classList.add('sleeping'); sleepZzz.classList.add('show'); }
    function exitSleep() { mascot.classList.remove('sleeping'); sleepZzz.classList.remove('show'); }

    mascot.addEventListener('click', function (e) {
      e.preventDefault();
      if (cooldownActive) return;
      mascotBounce();
    });

    function animateBalance(from, to, duration) {
      const start = performance.now();
      function step(now) {
        const progress = Math.min((now - start) / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        const current = Math.round(from + (to - from) * eased);
        statBalance.textContent = current.toLocaleString();
        updateLevel(current);
        updateWithdraw(current);
        if (progress < 1) requestAnimationFrame(step);
        else {
          statBalance.textContent = to.toLocaleString();
          updateLevel(to);
          updateWithdraw(to);
        }
      }
      requestAnimationFrame(step);
    }

    function showAchievement(text) {
      achievementText.textContent = text;
      achievementToast.classList.add('show');
      setTimeout(() => achievementToast.classList.remove('show'), 3000);
    }
    function checkFirstAdAchievement() {
      if (!localStorage.getItem('jc_first_ad_seen')) {
        localStorage.setItem('jc_first_ad_seen', '1');
        setTimeout(() => showAchievement('أول إعلان! First Ad Watched'), 1200);
      }
    }

    watchBtn.addEventListener('click', function (e) {
      e.preventDefault();
      if (cooldownActive) return;
      cooldownActive = true;
      watchBtn.disabled = true;
      watchBtn.classList.remove('pulse');
      statusLine.textContent = '⏳ جاري تحميل الإعلان...';
      statusLine.style.color = '#F2CD6B';
      mascotBounce();

      setTimeout(() => {
        const oldBalance = balance;
        balance += 1000;
        animateBalance(oldBalance, balance, 900);
        statusLine.textContent = '✅ تمت المشاهدة! +1000 نقطة';
        statusLine.style.color = '#6FA287';
        mascotCelebrate();
        checkFirstAdAchievement();

        let remaining = 15;
        const cooldownInterval = setInterval(() => {
          remaining--;
          if (remaining > 0) {
            watchBtn.textContent = `متاح خلال ${remaining} ث`;
          } else {
            clearInterval(cooldownInterval);
            watchBtn.textContent = '🎥 شاهد الآن';
            watchBtn.disabled = false;
            watchBtn.classList.add('pulse');
            statusLine.textContent = 'المكافأة: +1000 نقطة';
            statusLine.style.color = '#F2CD6B';
            cooldownActive = false;
            exitSleep();
          }
        }, 1000);
        setTimeout(enterSleep, 1000);
      }, 2000);
    });

    document.getElementById('supportBtn').addEventListener('click', function (e) {
      e.preventDefault();
      window.open('https://t.me/abkhali', '_blank');
    });

    updateLevel(balance);
    updateWithdraw(balance);

    console.log('JaibCash Home Screen loaded!');
  </script>

</body>
</html>
