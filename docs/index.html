<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Jaib Cash</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      background: #0A1122;
      color: #F3E9D2;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px 20px;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .mascot-img {
      max-width: 200px;
      border-radius: 20px;
      margin-bottom: 20px;
      transition: all 0.3s ease;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    .mascot-img:hover {
      transform: scale(1.05);
    }
    .mascot-img.bounce {
      animation: bounce 0.6s ease;
    }
    @keyframes bounce {
      0% { transform: scale(1); }
      30% { transform: scale(1.1) rotate(-3deg); }
      60% { transform: scale(1.05) rotate(3deg); }
      100% { transform: scale(1) rotate(0); }
    }
    .mascot-img.happy {
      animation: happy 0.8s ease;
    }
    @keyframes happy {
      0% { transform: scale(1); }
      50% { transform: scale(1.15) rotate(5deg); }
      100% { transform: scale(1) rotate(0); }
    }
    .mascot-img.celebrate {
      animation: celebrate 0.8s ease;
    }
    @keyframes celebrate {
      0% { transform: scale(1) rotate(0deg); }
      25% { transform: scale(1.1) rotate(-5deg); }
      50% { transform: scale(1.15) rotate(5deg); }
      75% { transform: scale(1.1) rotate(-3deg); }
      100% { transform: scale(1) rotate(0); }
    }
    .btn {
      background: linear-gradient(135deg, #C9A03E, #F2CD6B);
      color: #0A1122;
      border: none;
      padding: 15px 40px;
      border-radius: 30px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s;
      touch-action: manipulation;
    }
    .btn:active {
      transform: scale(0.95);
    }
    .status {
      margin-top: 15px;
      font-size: 14px;
      color: #F2CD6B;
    }
    .panel {
      background: rgba(19,31,61,0.8);
      border-radius: 16px;
      padding: 20px;
      margin: 15px 0;
      width: 100%;
      max-width: 400px;
      border: 1px solid rgba(242,205,107,0.1);
    }
    .eyebrow {
      font-size: 12px;
      color: #F2CD6B;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin: 0 0 10px;
    }
    .balance {
      font-size: 32px;
      font-weight: bold;
      color: #FCE8AE;
    }
    h1 {
      color: #F2CD6B;
      font-size: 28px;
      margin: 0;
    }
    h1 span {
      color: #FCE8AE;
    }
    .sub {
      color: rgba(243,233,210,0.6);
      font-size: 14px;
      margin-top: 5px;
    }
  </style>
</head>
<body>

  <!-- ===== التطبيق ===== -->
  <div class="app">

    <h1>Jaib <span>Cash</span></h1>
    <p class="sub">Turn Your Time Into Rewards</p>

    <div class="panel">
      <p class="eyebrow">رصيدك الآن</p>
      <div class="balance" id="balanceDisplay">128,500</div>
      <p style="font-size:12px;color:rgba(243,233,210,0.5);">نقطة</p>
    </div>

    <div>
      <img src="mascot.png?v=4" alt="مساعد Jaib Cash" class="mascot-img" id="mascotImg">
    </div>

    <div class="panel">
      <p class="eyebrow">شاهد إعلان</p>
      <button class="btn" id="watchBtn">شاهد الآن</button>
      <div class="status" id="statusLine">اضغط الزر لبدء المشاهدة</div>
    </div>

    <div class="panel">
      <p class="eyebrow">الدعم</p>
      <button class="btn" id="supportBtn" style="background:transparent;border:1px solid rgba(242,205,107,0.4);color:#F2CD6B;width:100%;">📞 تواصل مع الدعم</button>
    </div>

  </div>

  <script>
    // ===== Telegram WebApp =====
    const tg = window.Telegram?.WebApp;
    if (tg) { tg.ready(); tg.expand(); }

    // ===== العناصر =====
    const mascot = document.getElementById('mascotImg');
    const statusLine = document.getElementById('statusLine');
    const balanceDisplay = document.getElementById('balanceDisplay');

    let balance = 128500;

    // ===== تفاعلات الشخصية =====
    function mascotBounce() {
      mascot.classList.remove('bounce');
      void mascot.offsetWidth;
      mascot.classList.add('bounce');
      setTimeout(() => mascot.classList.remove('bounce'), 600);
    }

    function mascotHappy() {
      mascot.classList.remove('happy');
      void mascot.offsetWidth;
      mascot.classList.add('happy');
      setTimeout(() => mascot.classList.remove('happy'), 800);
    }

    function mascotCelebrate() {
      mascot.classList.remove('celebrate');
      void mascot.offsetWidth;
      mascot.classList.add('celebrate');
      setTimeout(() => mascot.classList.remove('celebrate'), 800);
    }

    // ===== النقر على الشخصية =====
    mascot.addEventListener('click', function(e) {
      e.preventDefault();
      mascotBounce();
      mascotHappy();
    });

    // ===== رمش عشوائي =====
    function randomBlink() {
      mascot.style.filter = 'brightness(0.8) contrast(1.2)';
      setTimeout(() => {
        mascot.style.filter = '';
      }, 150);
    }
    setInterval(() => {
      if (Math.random() > 0.6) randomBlink();
    }, 3000);

    // ===== زر مشاهدة الإعلان =====
    document.getElementById('watchBtn').addEventListener('click', function(e) {
      e.preventDefault();
      statusLine.textContent = '⏳ جاري تحميل الإعلان...';
      statusLine.style.color = '#F2CD6B';

      mascotBounce();

      setTimeout(() => {
        balance += 1000;
        balanceDisplay.textContent = balance.toLocaleString();

        statusLine.textContent = '✅ تمت المشاهدة! +1000 نقطة';
        statusLine.style.color = '#6FA287';

        mascotCelebrate();
      }, 2000);
    });

    // ===== زر الدعم =====
    document.getElementById('supportBtn').addEventListener('click', function(e) {
      e.preventDefault();
      window.open('https://t.me/abkhali', '_blank');
    });

    console.log('JaibCash Mini App loaded!');
  </script>

</body>
</html>
